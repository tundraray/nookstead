# ============================================
# Production Docker Compose
# ============================================
#
# Usage:
#   1. Copy .env.example to .env and fill in production values
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. (optional) Include genmap: docker compose -f docker-compose.prod.yml --profile full up -d
#
# PostgreSQL and Redis are expected to be provisioned externally.
# Set DATABASE_URL and REDIS_URL in .env.
#
# Images are pulled from GitHub Container Registry (ghcr.io).
# Override IMAGE_TAG in .env or shell (default: latest).

services:
  nookstead-server:
    container_name: nookstead-server
    image: ghcr.io/tundraray/nookstead/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${COLYSEUS_PORT:-2567}:2567'
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      COLYSEUS_PORT: 2567
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in .env}

  nookstead-game:
    container_name: nookstead-game
    image: ghcr.io/tundraray/nookstead/game:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${GAME_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      COLYSEUS_URL: ${COLYSEUS_URL:?Set COLYSEUS_URL in .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID:-}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET:-}
    depends_on:
      nookstead-server:
        condition: service_started

  nookstead-genmap:
    container_name: nookstead-genmap
    image: ghcr.io/tundraray/nookstead/genmap:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${GENMAP_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-}
    profiles:
      - full

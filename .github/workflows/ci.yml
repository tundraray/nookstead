name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - run: pnpm nx affected -t lint test typecheck --no-cloud
      - run: pnpm nx affected -t build --skip-nx-cache --no-cloud

  release:
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # 1. Dry-run to determine next version (no tag/release created)
      - name: Determine next version
        id: next-version
        run: |
          OUTPUT=$(pnpm exec semantic-release --dry-run 2>&1) || true
          VERSION=$(echo "$OUTPUT" | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "Next version: $VERSION"
          else
            echo "No new release needed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build & push Docker images BEFORE creating the release
      - name: Set up Docker Buildx
        if: steps.next-version.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        if: steps.next-version.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        if: steps.next-version.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nookstead-server:v${{ steps.next-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nookstead-server:latest
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Build & push game image
        if: steps.next-version.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: game
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nookstead-game:v${{ steps.next-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nookstead-game:latest
          cache-from: type=gha,scope=docker-build

      - name: Build & push steward image
        if: steps.next-version.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: steward
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nookstead-steward:v${{ steps.next-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nookstead-steward:latest
          cache-from: type=gha,scope=docker-build

      - name: Build & push genmap image
        if: steps.next-version.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: genmap
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nookstead-genmap:v${{ steps.next-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nookstead-genmap:latest
          cache-from: type=gha,scope=docker-build

      # 3. Create tag & GitHub release only after Docker images are pushed
      - name: Create release
        if: steps.next-version.outputs.version != ''
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
